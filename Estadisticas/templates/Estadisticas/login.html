{% extends 'Estadisticas/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 bg-white p-4 shadow-sm rounded">
        <h3>Iniciar Sesión</h3>
        <form method="POST" class="mt-3">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Usuario" class="form-control mb-2">
            <input type="password" name="password" placeholder="Contraseña" class="form-control mb-3">
            <button class="btn btn-primary w-100">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
